services:
  - type: web
    name: ticoeur-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/ticoeur.db
      - key: FRONTEND_URL
        value: ${FRONTEND_URL}
    disk:
      name: ticoeur-data
      mountPath: /var/data
      sizeGB: 1
